<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM CLASS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <h1 id="title">
        Hello World
    </h1>

    <div class="" id="container">

    </div>

    <a id="link">Click here.</a>

    <button id="btn">Click me</button>

    <form id="myForm" action="" class="flex flex-col w-full gap-[20px] border rounded-lg p-[20px] items-center justify-center">
        <div class="flex flex-col gap-4">
            <label for="name">Name</label>
            <input class="p-[10px] border focus:border-blue-500 focus:outline-none" id="name" type="text" placeholder="Enter your full name">
        </div>

        <div class="flex flex-col gap-4">
            <label for="email">Email</label>
            <input id="email" class="p-[10px] border focus:border-blue-500 focus:outline-none" type="text" placeholder="Enter your email">
        </div>


        <div class="flex flex-col gap-4">
            <label for="password">Password</label>
            <input class="p-[10px] border focus:border-blue-500 focus:outline-none" id="password" type="password" placeholder="Enter your password">
        </div>

        <input type="submit" value="Submit" class="p-[10px] border">
    </form>
</body>
<script src="/dom.js"></script>

</html>
